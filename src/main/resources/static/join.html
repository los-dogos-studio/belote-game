<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="session.js" type="module"></script>
    <script src="join.js" type="module"></script>
    <title>Gurian Belote - Join</title>
</head>
<body>

    <div id="session-banner" style="display:none">
        <p id="session-info"></p>
        <button id="btn-rejoin">Rejoin</button>
        <button id="btn-clear">Clear Session</button>
    </div>

    <h1>Join Game</h1>

    <form id="join-form">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" placeholder="giorgi" maxlength="20" />

        <label for="room-id">Room ID</label>
        <input type="text" id="room-id" placeholder="1234" maxlength="4" minlength="4" />

        <label for="team">Team</label>
        <select id="team">
            <option value="A">Team A</option>
            <option value="B">Team B</option>
        </select>

        <button type="submit">Join</button>
        <p id="error-msg"></p>
    </form>

    <ul id="player-list"></ul>

</body>
</html>
