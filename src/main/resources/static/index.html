<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="session.js" type="module"></script>
    <script src="main.js" type="module"></script>
    <link rel="stylesheet" href="style.css">
    <title>Gurian Belote</title>
</head>
<body>

    <div id="session-banner" style="display:none">
        <p id="session-info"></p>
        <button id="btn-rejoin">Rejoin</button>
        <button id="btn-clear">Clear Session</button>
    </div>

    <h1>Gurian Belote</h1>

    <form id="create-form">
        <label for="nickname">Nickname</label>
        <input type="text" id="nickname" placeholder="giorgi" maxlength="20" required />
        <button type="submit">Create Game</button>
        <p id="error-msg"></p>
    </form>
    <a href="join.html">Already have a room ID? Join here</a>
</body>
</html>
