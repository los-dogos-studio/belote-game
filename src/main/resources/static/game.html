<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Belote - Game</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="game-container">
    <div class="game-header">
      <h1>Belote</h1>
      <div class="info">
        <div>Room: <strong id="room-display">-</strong></div>
        <div class="score">
          Team A: <strong id="score-a">0</strong> | Team B: <strong id="score-b">0</strong>
        </div>
      </div>
    </div>

    <div id="error-display" class="error-msg"></div>

    <div id="s-waiting" class="phase-section hidden">
      <h2>Waiting for Players</h2>
      <p id="waiting-text"></p>
      <div class="player-list" id="waiting-players"></div>
    </div>

    <div id="s-bidding" class="phase-section hidden">
      <h2>Trump Selection</h2>
      <div class="hand-section">
        <h3>Your Cards (5)</h3>
        <div class="card-list" id="bidding-hand"></div>
      </div>
      <div class="flipped-card" id="flipped-card"></div>
      <div id="bidding-actions"></div>
    </div>

    <div id="s-declare" class="phase-section hidden">
      <h2>Declare Combinations</h2>
      <div class="timer">Time: <span id="timer-text">30</span>s</div>
      <div class="hand-section">
        <h3>Your Cards</h3>
        <div class="card-list" id="declare-hand"></div>
      </div>
      <div class="combo-form">
        <h3>Declare Combo</h3>
        <div class="form-row">
          <div>
            <label>Type</label>
            <select id="combo-type" onchange="updateComboForm()">
              <option value="MIYOLEBA">Sequence</option>
              <option value="ERTNAIREBI">Four of a Kind</option>
            </select>
          </div>
          <div>
            <label>Suit</label>
            <select id="combo-suit">
              <option value="">-</option>
              <option value="GULI">♥ Hearts</option>
              <option value="WKENTI">♠ Spades</option>
              <option value="JVARI">♣ Clubs</option>
              <option value="YVAVI">♦ Diamonds</option>
            </select>
          </div>
          <div>
            <label>Highest Rank</label>
            <select id="combo-rank">
              <option value="SHVIDI">7</option>
              <option value="RVA">8</option>
              <option value="CXRA">9</option>
              <option value="ATI">10</option>
              <option value="VALETI">J</option>
              <option value="DAMA">Q</option>
              <option value="KAROLI">K</option>
              <option value="TUZI">A</option>
            </select>
          </div>
          <div>
            <label>Length</label>
            <input type="number" id="combo-length" min="3" max="8" value="3">
          </div>
        </div>
        <button onclick="addCombo()">Add Combo</button>
      </div>
      <div class="combo-list" id="combo-list-display"></div>
      <div class="button-group">
        <button onclick="declareAllCombos()">Declare Combos</button>
        <button onclick="declareNoCombos()">No Combos</button>
      </div>
    </div>

    <div id="s-tricks" class="phase-section hidden">
      <div class="hand-section">
        <h3>Your Cards</h3>
        <div class="card-list" id="tricks-hand"></div>
      </div>
      <div class="table-section">
        <h3>Current Trick</h3>
        <div class="trick-table" id="trick-display"></div>
      </div>
      <div id="tricks-message"></div>
      <div class="button-group" id="tricks-buttons"></div>
    </div>

    <div id="s-gameover" class="phase-section hidden">
      <div class="game-over">
        <h2 id="winner-text"></h2>
        <div class="final-scores">
          <div>Team A: <strong id="final-score-a">0</strong></div>
          <div>Team B: <strong id="final-score-b">0</strong></div>
        </div>
        <button onclick="backToLobby()">Back to Lobby</button>
      </div>
    </div>
  </div>

  <script type="module" src="js/game.js"></script>
</body>
</html>
