<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Belote</title>
  <link rel="stylesheet" href="css/style.css">
  <script type="module" src="js/game.js"></script>
</head>
<body class="game-body">

  <div id="topBar" class="top-bar">
    <span id="scoreA"></span>
    <span id="trumpInfo" style="flex:1; text-align:center;"></span>
    <span id="scoreB"></span>
  </div>

  <div class="arena" style="flex:1; max-width:600px; margin:0 auto; width:100%;">
    <div></div>
    <div id="pTop" class="player-slot" ></div>
    <div></div>

    <div id="pLeft" class="player-slot" ></div>
    <div id="trickArea" style="display:flex; flex-wrap:wrap; gap:0.4rem; justify-content:center; align-items:center; min-height:70px;"></div>
    <div id="pRight" class="player-slot" ></div>

    <div></div>
    <div id="pBottom" class="player-slot" ></div>
    <div></div>
  </div>

  <div id="actions" style="text-align:center; padding:0.4rem; color:white; flex-shrink:0;"></div>
  <div id="hand" class="hand"></div>
  <div id="error" class="error" style="text-align:center; padding:0.3rem; color:#ff8a80;"></div>

  <!-- Combo declaration overlay -->
  <div id="comboOverlay" class="overlay" style="display:none;">
    <div class="overlay-card">
      <h3 style="margin-bottom:1rem;">Declare Combos</h3>
      <div id="comboHand" style="display:flex; flex-wrap:wrap; gap:0.3rem; margin-bottom:1rem;"></div>
      <div id="comboButtons" style="display:none; margin-bottom:0.5rem;"></div>
      <div id="comboList" style="margin-bottom:1rem;"></div>
      <button id="readyBtn" style="background:#388e3c; color:white; width:100%;">Ready</button>
      <div id="comboError" class="error"></div>
    </div>
  </div>

  <!-- Round end overlay -->
  <div id="roundEndOverlay" class="overlay" style="display:none;">
    <div class="overlay-card" style="text-align:center;">
      <h3 style="margin-bottom:1rem;">Round End</h3>
      <div id="roundEndContent"></div>
    </div>
  </div>

  <!-- Game over overlay -->
  <div id="gameOverOverlay" class="overlay" style="display:none;">
    <div class="overlay-card" style="text-align:center;">
      <h2 style="margin-bottom:1rem;">Game Over</h2>
      <div id="gameOverContent"></div>
      <button onclick="window.location.href='index.html'" style="background:#f57c00; color:white; margin-top:1rem; width:100%;">New Game</button>
    </div>
  </div>

</body>
</html>
